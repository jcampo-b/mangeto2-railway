# Magento 2: docroot = pub/; PORT replaced by entrypoint (Railway)
server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;
    root /var/www/html/pub;

    index index.php;
    autoindex off;
    charset utf-8;

    # Railway healthcheck: 200 only when Nginx is up (after Magento install in entrypoint)
    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # /media/: if file missing, let Magento generate it via get.php (e.g. resized product images)
    location ^~ /media/ {
        try_files $uri $uri/ /get.php$is_args$args;
        add_header Cache-Control "public, no-transform";
        expires max;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 600;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires max;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }
}
